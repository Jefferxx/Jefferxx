name: Metrics
on:
  # Schedule updates (daily)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: Jefferxx
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Guayaquil
          
          # Plugin: Isocalendar (3D Activity)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Plugin: Languages (Refined)
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less, jupyter notebook
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage
          
          # Plugin: Habits (Professional Discipline)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # Plugin: Lines (Code Volume)
          plugin_lines: yes
