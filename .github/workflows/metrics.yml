name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Jefferxx
          template: classic
          base: header, activity, repositories
          config_timezone: America/Guayaquil
          
          # Plugin: Isocalendar (Funcionando)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Plugin: Languages (Funcionando y filtrado)
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less, jupyter notebook
          plugin_languages_limit: 8
          
          # Plugin: Lines (Funcionando)
          plugin_lines: yes
          
          # Habits desactivado temporalmente para evitar errores visuales
          plugin_habits: no
          
          # Optimización de errores
          committer_token: ${{ secrets.GITHUB_TOKEN }}
